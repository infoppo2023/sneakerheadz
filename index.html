// ── roundRect polyfill (for browsers without native support) ──
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r=[r,r,r,r];
    else if(Array.isArray(r)){while(r.length<4)r.push(r[0]);}
    else r=[0,0,0,0];
    this.beginPath();
    this.moveTo(x+r[0],y);
    this.lineTo(x+w-r[1],y);this.arcTo(x+w,y,x+w,y+r[1],r[1]);
    this.lineTo(x+w,y+h-r[2]);this.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
    this.lineTo(x+r[3],y+h);this.arcTo(x,y+h,x,y+h-r[3],r[3]);
    this.lineTo(x,y+r[0]);this.arcTo(x,y,x+r[0],y,r[0]);
    this.closePath();return this;
  };
}

];
function getStage(d){ let s=STAGES[0]; for(const st of STAGES) if(d>=st.minDist) s=st; return s; }

// =====================================================
//  localStorage  Leaderboard only
// =====================================================
const LS_SCORES = 'harajuku_scores3';
function getLeaderboard(){
  try{ return JSON.parse(localStorage.getItem(LS_SCORES)||'[]'); }catch(e){ return []; }
}
function saveScore(score){
  const scores=getLeaderboard();
  const date=new Date().toLocaleDateString('ja-JP');
  scores.push({score,date}); scores.sort((a,b)=>b.score-a.score); scores.splice(10);
  try{ localStorage.setItem(LS_SCORES,JSON.stringify(scores)); }catch(e){}
}

// =====================================================
//  Audio Engine
// =====================================================
let audioCtx=null, masterGain=null, muted=false;
const BPM=90, S16=(60/BPM)/4;
const S16_T=(60/76)/4;   // title BGM tempo (76 BPM – chill lo-fi)
const S16_S=(60/64)/4;   // score BGM tempo (64 BPM – melancholic)
let nextNote16=0, note16Idx=0, bgmTimer=null, bgmType='play', bgmStartTimeout=null;
function ac(){ return audioCtx; }
function now(){ return audioCtx?audioCtx.currentTime:0; }
function makeGain(vol,dest){ const g=ac().createGain(); g.gain.value=vol; g.connect(dest||masterGain); return g; }
function osc(freq,type,start,dur,vol){ const o=ac().createOscillator(),g=makeGain(0); o.type=type; o.frequency.value=freq; o.connect(g); g.gain.setValueAtTime(vol,start); g.gain.exponentialRampToValueAtTime(0.0001,start+dur); o.start(start); o.stop(start+dur+0.01); }
function oscRamp(f0,f1,type,start,dur,vol){ const o=ac().createOscillator(),g=makeGain(0); o.type=type; o.frequency.setValueAtTime(f0,start); o.frequency.exponentialRampToValueAtTime(f1,start+dur); o.connect(g); g.gain.setValueAtTime(vol,start); g.gain.exponentialRampToValueAtTime(0.0001,start+dur); o.start(start); o.stop(start+dur+0.01); }
function noise(start,dur,vol,ft,ff){ const buf=ac().createBuffer(1,Math.ceil(ac().sampleRate*dur),ac().sampleRate),d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; const src=ac().createBufferSource(); src.buffer=buf; const flt=ac().createBiquadFilter(); flt.type=ft; flt.frequency.value=ff; const g=makeGain(0); src.connect(flt); flt.connect(g); g.gain.setValueAtTime(vol,start); g.gain.exponentialRampToValueAtTime(0.0001,start+dur); src.start(start); src.stop(start+dur+0.01); }

// ── PLAY BGM (night: hip-hop / day: bright pop) ──
function scheduleBGMNote(idx,t){
  const p=idx%32;
  // Smooth day/night crossfade — 0=full night, 1=full day
  // Dawn: phase 0.18→0.26 (fade in day), Dusk: phase 0.74→0.82 (fade out day)
  let db=0;
  if(bgDayPhase>=0.18&&bgDayPhase<0.26)db=(bgDayPhase-0.18)/0.08;
  else if(bgDayPhase>=0.26&&bgDayPhase<0.74)db=1;
  else if(bgDayPhase>=0.74&&bgDayPhase<0.82)db=1-(bgDayPhase-0.74)/0.08;
  const nv=1-db,dv=db; // night volume, day volume (sum=1)

  if(nv>0.01){
    // ── NIGHT: full hip-hop beat ──────────────────────────────
    if([0,10,16,26].includes(p)){oscRamp(180,40,'sine',t,0.35,0.7*nv);oscRamp(80,30,'sine',t,0.25,0.5*nv);}
    if([8,24].includes(p)){noise(t,0.18,0.32*nv,'bandpass',2200);osc(220,'square',t,0.04,0.15*nv);}
    if(p%4===0){noise(t,0.12,0.18*nv,'highpass',9000);}else if(p%2===0){noise(t,0.055,0.09*nv,'highpass',11000);}
    const bf=[65.4,65.4,0,0,77.8,65.4,0,0,61.7,0,65.4,0,73.4,0,65.4,0,65.4,65.4,0,0,82.4,65.4,0,0,65.4,0,77.8,0,65.4,0,61.7,0];
    if(bf[p]){const bG=ac().createGain(),bF=ac().createBiquadFilter(),bO=ac().createOscillator();bG.connect(masterGain);bF.type='lowpass';bF.frequency.value=800;bO.type='sawtooth';bO.frequency.value=bf[p];bO.connect(bF);bF.connect(bG);bG.gain.setValueAtTime(0.22*nv,t);bG.gain.setValueAtTime(0.18*nv,t+S16*0.7);bG.gain.exponentialRampToValueAtTime(0.0001,t+S16*1.8);bO.start(t);bO.stop(t+S16*2);}
    const ch=[[130.8,155.6,196],[116.5,155.6,185],[103.8,130.8,155.6],[116.5,138.6,174.6]];
    if([0,8,16,24].includes(p)){ch[(p/8)%4].forEach(f=>{const sG=ac().createGain(),sO=ac().createOscillator();sG.connect(masterGain);sO.type='triangle';sO.frequency.value=f;sO.connect(sG);sG.gain.setValueAtTime(0.038*nv,t);sG.gain.setValueAtTime(0.025*nv,t+S16*6);sG.gain.exponentialRampToValueAtTime(0.0001,t+S16*7.8);sO.start(t);sO.stop(t+S16*8);});};
  }
  if(dv>0.01){
    // ── DAY: funky city-pop groove ───────────────────────────
    // Syncopated funk kick: 0,3,8,12,16,19,24,28
    if([0,3,8,12,16,19,24,28].includes(p)){oscRamp(210,65,'sine',t,0.14,0.32*dv);}
    // Tight snare/clap: 8, 24  + ghost on 14, 30
    if(p===8||p===24){noise(t,0.07,0.30*dv,'bandpass',3200);osc(380,'square',t,0.025,0.10*dv);}
    if(p===14||p===30){noise(t,0.04,0.12*dv,'bandpass',3500);}
    // Open hi-hat on offbeats (every 2 steps), closed on every step
    if(p%2===0){noise(t,0.05,0.18*dv,'highpass',10500);}else{noise(t,0.025,0.07*dv,'highpass',12000);}
    // Funky walking bass: C pentatonic run up & down
    const dayBass=[130.8,0,164.8,0,196,0,220,0,
                   261.6,0,220,0,196,0,164.8,0,
                   130.8,0,146.8,0,164.8,246.9,0,0,
                   196,0,261.6,0,246.9,0,220,0];
    if(dayBass[p]){
      const bG=ac().createGain(),bF=ac().createBiquadFilter(),bO=ac().createOscillator();
      bG.connect(masterGain);bF.type='lowpass';bF.frequency.value=1400;
      bO.type='sawtooth';bO.frequency.value=dayBass[p];bO.connect(bF);bF.connect(bG);
      bG.gain.setValueAtTime(0.18*dv,t);bG.gain.setValueAtTime(0.12*dv,t+S16*0.5);
      bG.gain.exponentialRampToValueAtTime(0.0001,t+S16*1.5);bO.start(t);bO.stop(t+S16*1.7);
    }
    // Bright maj7 / dom7 chords (jazz-funk: Cmaj7 → Am7 → Fmaj7 → G7)
    const dch=[
      [261.6,329.6,392,493.9],   // Cmaj7
      [220,  261.6,329.6,440  ], // Am7
      [174.6,220,  261.6,349.2], // Fmaj7
      [196,  246.9,293.7,392  ]  // G7
    ];
    if([0,8,16,24].includes(p)){dch[(p/8)%4].forEach(f=>{
      const sG=ac().createGain(),sO=ac().createOscillator();
      sG.connect(masterGain);sO.type='triangle';sO.frequency.value=f;sO.connect(sG);
      sG.gain.setValueAtTime(0.030*dv,t);sG.gain.setValueAtTime(0.018*dv,t+S16*4);
      sG.gain.exponentialRampToValueAtTime(0.0001,t+S16*6.5);sO.start(t);sO.stop(t+S16*7);
    });}
    // Bright staccato guitar-ish stabs on offbeats
    if([4,6,20,22].includes(p)){
      [523,659,784].forEach(f=>{
        const sG=ac().createGain(),sO=ac().createOscillator();
        sG.connect(masterGain);sO.type='square';sO.frequency.value=f;sO.connect(sG);
        sG.gain.setValueAtTime(0.018*dv,t);sG.gain.exponentialRampToValueAtTime(0.0001,t+S16*0.6);
        sO.start(t);sO.stop(t+S16*0.7);
      });
    }
    // City-pop melody (uplifting ascending/descending phrase)
    const dayMel=[
       523,  0,  659,  0,  784,  0,  880,  0,
      1047,  0,  880,  0,  784,  0,  659,  0,
       784,  0,  880,  0, 1047,  0, 1175,  0,
      1047,  0,  880,  0,  784,  0,  659,  0
    ];
    if(dayMel[p]){
      const mG=ac().createGain(),mO=ac().createOscillator();
      mG.connect(masterGain);mO.type='triangle';mO.frequency.value=dayMel[p];mO.connect(mG);
      mG.gain.setValueAtTime(0.028*dv,t);mG.gain.setValueAtTime(0.016*dv,t+S16*0.9);
      mG.gain.exponentialRampToValueAtTime(0.0001,t+S16*2.2);mO.start(t);mO.stop(t+S16*2.4);
      // Shimmer octave above
      const mG2=ac().createGain(),mO2=ac().createOscillator();
      mG2.connect(masterGain);mO2.type='sine';mO2.frequency.value=dayMel[p]*2;mO2.connect(mG2);
      mG2.gain.setValueAtTime(0.009*dv,t);mG2.gain.exponentialRampToValueAtTime(0.0001,t+S16*1.4);
      mO2.start(t);mO2.stop(t+S16*1.5);
    }
  }
}

// ── TITLE BGM (lo-fi chill, Am pentatonic) ──
function scheduleTitleNote(idx,t){
  const p=idx%32;
  // Soft kick on 0,16
  if(p===0||p===16){oscRamp(140,35,'sine',t,0.28,0.45);oscRamp(60,25,'sine',t,0.2,0.3);}
  // Brushed snare on 8,24 (gentler)
  if(p===8||p===24){noise(t,0.14,0.18,'bandpass',1800);osc(180,'square',t,0.03,0.08);}
  // Soft hi-hat every 4 steps
  if(p%4===0){noise(t,0.06,0.09,'highpass',10000);}
  // Bass walk: A2,G2,F2,E2,A2,G2,Am chords 8-step blocks
  const bassNotes=[55,55,0,0,49,49,0,0,43.7,43.7,0,0,41.2,41.2,0,0,55,55,0,0,49,49,0,0,55,0,49,0,41.2,0,43.7,0];
  if(bassNotes[p]){const bG=ac().createGain(),bF=ac().createBiquadFilter(),bO=ac().createOscillator();bG.connect(masterGain);bF.type='lowpass';bF.frequency.value=600;bO.type='triangle';bO.frequency.value=bassNotes[p];bO.connect(bF);bF.connect(bG);bG.gain.setValueAtTime(0.18,t);bG.gain.exponentialRampToValueAtTime(0.0001,t+S16_T*3.2);bO.start(t);bO.stop(t+S16_T*3.5);}
  // Soft pads: Am7, Dm7, Fmaj7, Em7 (change every 8 steps)
  const padChords=[[110,130.8,164.8,196],[110,146.8,185,220],[87.3,110,130.8,174.6],[82.4,98,123.5,164.8]];
  if([0,8,16,24].includes(p)){padChords[(p/8)%4].forEach(f=>{const sG=ac().createGain(),sO=ac().createOscillator();sG.connect(masterGain);sO.type='sine';sO.frequency.value=f;sO.connect(sG);sG.gain.setValueAtTime(0.028,t);sG.gain.setValueAtTime(0.022,t+S16_T*5);sG.gain.exponentialRampToValueAtTime(0.0001,t+S16_T*7.5);sO.start(t);sO.stop(t+S16_T*8);});}
  // Melody on top: slow pentatonic phrase (every 2 bars = 32 steps)
  const mel=[0,0,0,0,440,0,0,0,392,0,0,0,349,0,330,0,0,0,0,0,440,0,392,0,0,0,349,0,0,0,330,0];
  if(mel[p]){osc(mel[p],'triangle',t,S16_T*3,0.055);osc(mel[p]*2,'sine',t,S16_T*1.5,0.015);}
}

// ── SCORE BGM (melancholic descending, minor) ──
function scheduleScoreNote(idx,t){
  const p=idx%32;
  // Very soft brush on 8,24
  if(p===8||p===24){noise(t,0.1,0.1,'bandpass',1400);}
  // Descending bassline: Am → G → F → Em
  const scoreB=[55,0,0,0,49,0,0,0,43.7,0,0,0,41.2,0,0,0,55,0,0,0,49,0,0,0,43.7,0,41.2,0,43.7,0,41.2,0];
  if(scoreB[p]){const bG=ac().createGain(),bO=ac().createOscillator();bG.connect(masterGain);bO.type='sine';bO.frequency.value=scoreB[p];bO.connect(bG);bG.gain.setValueAtTime(0.12,t);bG.gain.exponentialRampToValueAtTime(0.0001,t+S16_S*4);bO.start(t);bO.stop(t+S16_S*4.2);}
  // Soft pad chords: Am, G, F, Em
  const sPads=[[110,130.8,164.8],[98,123.5,146.8],[87.3,110,130.8],[82.4,98,123.5]];
  if([0,8,16,24].includes(p)){sPads[(p/8)%4].forEach(f=>{const sG=ac().createGain(),sO=ac().createOscillator();sG.connect(masterGain);sO.type='sine';sO.frequency.value=f;sO.connect(sG);sG.gain.setValueAtTime(0.022,t);sG.gain.setValueAtTime(0.014,t+S16_S*4);sG.gain.exponentialRampToValueAtTime(0.0001,t+S16_S*7.5);sO.start(t);sO.stop(t+S16_S*8);});}

    if(type==='dust'){p.color='rgba(180,160,140,';p.vx*=0.4;p.vy=-Math.random()*2;p.size=4+Math.random()*6;}

    if(type==='inv'){p.color=`hsla(${p.hue},100%,65%,`;p.vx=(Math.random()-0.5)*4;p.vy=-Math.random()*3;}

  nextEventItemDist=400+Math.floor(Math.random()*280);

function updateEvent(){
  if(activeEvent){
    eventTimer-=dt; activeEvent.elapsed+=dt;
    if(activeEvent.id==='slow_motion'){
      const st=getStage(distanceMeter),target=st.speedBase;
      speed=Math.max(4.5,target*(0.38+0.62*(activeEvent.elapsed/activeEvent.duration)));
    }
    if(eventTimer<=0) endEvent();
    return;
  }
  // Spawn event items while no event active
  nextEventItemDist-=speed*dt;
  if(nextEventItemDist<=0 && distanceMeter>50 && eventItems.length<2){
    const et=EV_ITEMS[Math.floor(Math.random()*EV_ITEMS.length)];

function updateEventItems(){
  eventItems.forEach(ei=>{ ei.x-=speed*dt; ei.phase+=0.06*dt; });
  const p=player.getHitbox();
  eventItems.forEach(ei=>{
    if(ei.collected)return;
    const fl=Math.sin(ei.phase)*7;
    if(p.x+p.w>ei.x-ei.r&&p.x<ei.x+ei.r&&p.y+p.h>ei.y+fl-ei.r&&p.y<ei.y+fl+ei.r){
      ei.collected=true;
      const ev=EVENTS.find(e=>e.id===ei.id);
      if(ev&&!activeEvent) startEvent(ev);
    }
  });
  eventItems=eventItems.filter(ei=>!ei.collected&&ei.x+ei.r>-20);

    const pulse=0.7+0.3*Math.sin(t*0.12+ei.phase);

    ctx.beginPath(); ctx.arc(cx,cy,ei.r+6+pulse*4,0,Math.PI*2); ctx.stroke();
    // main orb
    const grad=ctx.createRadialGradient(cx-ei.r*0.3,cy-ei.r*0.3,0,cx,cy,ei.r);
    grad.addColorStop(0,'rgba(255,255,255,0.95)');
    grad.addColorStop(0.35,ei.color+'ee');
    grad.addColorStop(1,ei.color+'44');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(cx,cy,ei.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // icon
    const iSz=ei.id==='sneaker_rush'?'bold 34px sans-serif':'bold 22px sans-serif';

    ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.font=iSz; ctx.textAlign='center';

    ctx.restore(); ctx.textAlign='left';

}

const GAP_PATTERNS=[
  ()=>Math.floor(Math.random()*8)+3,              // A: 3〜10px 小さめ隙間
  ()=>Math.floor(Math.random()*14)+5,             // B: 5〜18px 中程度
  ()=>(Math.random()<0.25?2:Math.floor(Math.random()*16)+6), // C: 基本隙間、たまに密着
  ()=>Math.floor(Math.random()*20)+10,            // D: 10〜29px ゆったり
];

// Preset shop orderings (ensure familymart/lawson at least 3 apart)
function shuffleShops(){
  const defs=[...SHOP_DEFS];
  // Fisher-Yates shuffle
  for(let i=defs.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [defs[i],defs[j]]=[defs[j],defs[i]];
  }
  // Enforce familymart/lawson separation (>= 3 positions apart)
  const fi=defs.findIndex(d=>d.type==='familymart');
  const li=defs.findIndex(d=>d.type==='lawson');
  if(Math.abs(fi-li)<3){
    const swap=defs.findIndex((d,i)=>Math.abs(i-fi)>=3&&Math.abs(i-li)>=3&&d.type!=='familymart'&&d.type!=='lawson');
    if(swap!==-1)[defs[li],defs[swap]]=[defs[swap],defs[li]];
  }
  return defs;
}

function initShopLayout(){
  const gapFn=GAP_PATTERNS[Math.floor(Math.random()*GAP_PATTERNS.length)];
  const ordered=shuffleShops();
  let x=0;
  shops=ordered.map(def=>{
    const s={...def,x};
    x+=def.w+gapFn();
    return s;
  });
  shopWrap=x; // seamless loop = total span
}

function drawBuilding(b,ox){
  const wrap=W+220,bx=((b.x+ox%wrap+wrap)%wrap)-80,by=GROUND_Y-b.h-20;
  // Main facade
  ctx.fillStyle=b.c;ctx.fillRect(bx,by,b.w,b.h+22);
  // Subtle floor lines
  ctx.strokeStyle=b.wc;ctx.lineWidth=0.5;
  for(let fl=40;fl<b.h;fl+=38){ctx.beginPath();ctx.moveTo(bx,by+fl);ctx.lineTo(bx+b.w,by+fl);ctx.stroke();}
  // Windows — deterministic seed (no flicker), day=一部点灯 night=多め点灯
  const night=(bgDayPhase<0.22||bgDayPhase>0.78);
  b.wins.forEach(([wx,wy])=>{
    const seed=((b.x*31+wx*17+wy*13)&0xff);
    const lit=night?(seed<170):(seed<50);
    const warm=(seed%2===0);
    ctx.fillStyle=lit?(warm?'#ffe8a0':'#c8e8ff'):'#181030';
    ctx.fillRect(bx+wx,by+wy,13,10);
    if(lit&&night){ctx.fillStyle='rgba(255,235,140,0.06)';ctx.fillRect(bx+wx-2,by+wy-2,17,14);}
  });
  // Rooftop detail
  if(b.top==='tank'){
    ctx.fillStyle='#2a2240';ctx.fillRect(bx+b.w/2-10,by-18,20,18);
    ctx.fillStyle='#1a1428';ctx.beginPath();ctx.arc(bx+b.w/2,by-18,11,Math.PI,0);ctx.fill();
  } else if(b.top==='antenna'){
    ctx.strokeStyle='#2a2240';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(bx+b.w/2,by);ctx.lineTo(bx+b.w/2,by-28);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx+b.w/2-10,by-20);ctx.lineTo(bx+b.w/2+10,by-20);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx+b.w/2-6,by-26);ctx.lineTo(bx+b.w/2+6,by-26);ctx.stroke();
  } else if(b.top==='sign'){
    ctx.fillStyle='#22183a';ctx.fillRect(bx+b.w/4,by-12,b.w/2,12);
    ctx.strokeStyle='#3a2860';ctx.lineWidth=1;ctx.strokeRect(bx+b.w/4,by-12,b.w/2,12);
  } else if(b.top==='ac'){
    for(let ai=0;ai<3;ai++){
      ctx.fillStyle='#1e1a2c';ctx.fillRect(bx+8+ai*22,by-8,16,8);
      ctx.strokeStyle='#2a2440';ctx.lineWidth=0.5;ctx.strokeRect(bx+8+ai*22,by-8,16,8);
    }
  }
}
function drawShop(s,ox,t){
  const wrap=shopWrap,sx=((s.x+ox%wrap+wrap)%wrap)-60,sy=GROUND_Y-s.h,sw=s.w,sh=s.h;

  // ── Main building facade (2 floors) ──────────────────────────
  ctx.fillStyle=s.wall;ctx.fillRect(sx,sy,sw,sh);

  // Upper floor (slightly darker or textured)
  const upperH=Math.round(sh*0.42);
  ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(sx,sy,sw,upperH);

  // Floor divider ledge
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(sx,sy+upperH,sw,4);
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(sx,sy+upperH+4,sw,2);

  // ── Brand logo on upper floor ────────────────────────────────
  drawBrandLogo(s.type,sx,sy,sw,upperH,t);

  // ── Awning ───────────────────────────────────────────────────
  const awY=sy+upperH+6,awH=22;
  ctx.fillStyle=s.aw;
  ctx.beginPath();ctx.moveTo(sx-6,awY);ctx.lineTo(sx+sw+6,awY);
  ctx.lineTo(sx+sw+2,awY+awH);ctx.lineTo(sx-2,awY+awH);ctx.closePath();ctx.fill();
  // Awning stripes
  ctx.fillStyle='rgba(255,255,255,0.12)';
  for(let i=0;i<sw+12;i+=18){
    ctx.beginPath();ctx.moveTo(sx-6+i,awY);ctx.lineTo(sx-6+i+9,awY);
    ctx.lineTo(sx-2+i+7,awY+awH);ctx.lineTo(sx-2+i-2,awY+awH);ctx.closePath();ctx.fill();
  }
  // Awning text
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(9,sw*0.072)}px monospace`;ctx.textAlign='center';
  ctx.shadowColor=s.aw;ctx.shadowBlur=4;
  ctx.fillText(s.awText,sx+sw/2,awY+14);ctx.shadowBlur=0;

  // ── Ground floor shop front ───────────────────────────────────
  const gfY=awY+awH,gfH=sh-(gfY-sy);
  // Big display window (60% width)
  const winW=Math.round(sw*0.58),winX=sx+8,winY=gfY+6;
  const winH=gfH-14;
  ctx.fillStyle='rgba(180,220,255,0.12)';ctx.fillRect(winX,winY,winW,winH);
  ctx.strokeStyle=s.aw;ctx.lineWidth=2;ctx.strokeRect(winX,winY,winW,winH);
  // Window reflection
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.beginPath();ctx.moveTo(winX+3,winY+3);ctx.lineTo(winX+winW*0.35,winY+3);
  ctx.lineTo(winX+winW*0.25,winY+winH-4);ctx.lineTo(winX+3,winY+winH-4);ctx.closePath();ctx.fill();
  // Window content
  drawWindowContent(s.type,sx,sy,sw,sh,winX,winY,winW,winH,t);

  // Door (right side of ground floor)
  const dX=sx+sw-36,dY=gfY+4,dW=28,dH=gfH-8;
  ctx.fillStyle='#0a0a14';ctx.beginPath();ctx.roundRect(dX,dY,dW,dH,[4,4,0,0]);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.5;ctx.strokeRect(dX,dY,dW,dH);
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(dX+3,dY+4,dW-6,12);
  ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(dX+7,dY+dH/2,3,0,Math.PI*2);ctx.fill();
  // Door window reflection
  ctx.fillStyle='rgba(180,220,255,0.08)';ctx.fillRect(dX+2,dY+18,dW-4,dH-26);

  // Ground shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(sx,GROUND_Y-4,sw,5);
}

function drawBrandLogo(type,sx,sy,sw,uh,t){
  const cx=sx+sw/2,cy=sy+uh/2;
  ctx.save();ctx.beginPath();ctx.rect(sx,sy,sw,uh);ctx.clip();
  if(type==='supreme'){
    const bw=Math.min(sw*0.72,100),bh=30;
    ctx.fillStyle='#cc0000';ctx.beginPath();ctx.roundRect(cx-bw/2,cy-bh/2,bw,bh,[3]);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.round(bh*0.62)}px Arial`;ctx.textAlign='center';
    ctx.fillText('SUPREME',cx,cy+bh*0.22);
  } else if(type==='bape'){
    ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.arc(cx,cy+2,20,0,Math.PI*2);ctx.fill();
    ['#1a3a1a','#0e2a0e','#2a4a1a','#1a2a0a'].forEach((col,i)=>{
      ctx.fillStyle=col;
      [[cx-12,cy-8],[cx+8,cy-12],[cx-6,cy+10],[cx+14,cy+6],[cx-16,cy+4]].forEach(([px,py])=>{
        ctx.beginPath();ctx.arc(px+i*3,py+i*2,4+i,0,Math.PI*2);ctx.fill();
      });
    });
    ctx.fillStyle='#c8a032';ctx.font=`bold ${Math.round(uh*0.26)}px monospace`;ctx.textAlign='center';
    ctx.fillText('A BATHING APE',cx,sy+uh-8);
  } else if(type==='neighborhood'){
    // Black wall + white "NEIGHBORHOOD" bold + small skull icon
    ctx.fillStyle='#141414';ctx.fillRect(sx,sy,sw,uh);
    ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.round(Math.min(uh*0.22,sw*0.12))}px Arial`;ctx.textAlign='center';
    ctx.fillText('NEIGHBOR',cx,cy-4);
    ctx.fillText('HOOD',cx,cy+Math.round(uh*0.24));
    // Simple skull outline
    ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(cx,sy+10,8,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-5,sy+18);ctx.lineTo(cx-5,sy+22);ctx.moveTo(cx,sy+18);ctx.lineTo(cx,sy+23);ctx.moveTo(cx+5,sy+18);ctx.lineTo(cx+5,sy+22);ctx.stroke();
  } else if(type==='newera'){
    // Clean navy store front
    ctx.fillStyle='#0d1433';ctx.fillRect(sx,sy,sw,uh);
    // White horizontal stripe across middle
    const strY=cy-Math.round(uh*0.08);
    ctx.fillStyle='#ffffff';ctx.fillRect(sx+4,strY,sw-8,Math.round(uh*0.18));
    // "NEW ERA" bold text on stripe
    ctx.fillStyle='#0d1433';ctx.font=`bold ${Math.round(Math.min(uh*0.16,sw*0.14))}px Arial`;
    ctx.textAlign='center';ctx.fillText('NEW ERA',cx,strY+Math.round(uh*0.14));
    // Small red accent bar below stripe
    ctx.fillStyle='#cc1122';ctx.fillRect(sx+4,strY+Math.round(uh*0.18),sw-8,3);
    // Fitted cap silhouette icon (simple outline)
    const capY=sy+Math.round(uh*0.22),capW=Math.round(sw*0.38),capH=Math.round(uh*0.24);
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.moveTo(cx-capW*0.5,capY+capH);
    ctx.bezierCurveTo(cx-capW*0.5,capY+capH*0.3, cx-capW*0.1,capY, cx,capY);
    ctx.bezierCurveTo(cx+capW*0.1,capY, cx+capW*0.5,capY+capH*0.3, cx+capW*0.5,capY+capH);
    ctx.closePath();ctx.fill();
    // Brim
    ctx.fillStyle='rgba(255,255,255,0.10)';
    ctx.beginPath();ctx.ellipse(cx+capW*0.15,capY+capH,capW*0.5,capH*0.12,0,0,Math.PI);ctx.fill();
  } else if(type==='offwhite'){
    // OFF-WHITE industrial quotes
    ctx.fillStyle='#1a1a1a';ctx.font=`bold ${Math.round(uh*0.38)}px monospace`;ctx.textAlign='center';
    ctx.fillText('"OFF"',cx,cy-2);
    ctx.font=`${Math.round(uh*0.24)}px monospace`;ctx.fillStyle='#333';
    ctx.fillText('"WHITE"',cx,cy+Math.round(uh*0.3));
    // Diagonal stripe
    ctx.strokeStyle='#1a1a1a';ctx.lineWidth=4;ctx.lineCap='butt';
    ctx.beginPath();ctx.moveTo(sx+6,sy+uh-6);ctx.lineTo(sx+sw-6,sy+6);ctx.stroke();
  } else if(type==='stussy'){
    // Script-style "Stussy" text
    ctx.fillStyle='#ff6600';ctx.shadowColor='#ff6600';ctx.shadowBlur=6;
    ctx.font=`bold italic ${Math.round(uh*0.42)}px Georgia`;ctx.textAlign='center';
    ctx.fillText('Stussy',cx,cy+8);ctx.shadowBlur=0;
  } else if(type==='palace'){
    // Triangle Tri-ferg logo
    const ts=Math.round(Math.min(sw,uh)*0.38);
    ctx.fillStyle='#cc2200';
    ctx.beginPath();ctx.moveTo(cx,cy-ts);ctx.lineTo(cx+ts*0.866,cy+ts*0.5);ctx.lineTo(cx-ts*0.866,cy+ts*0.5);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#ff4422';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font=`bold ${Math.round(ts*0.38)}px monospace`;ctx.textAlign='center';
    ctx.fillText('PALACE',cx,cy+ts*0.28);
  } else if(type==='starbucks'){
    // Green circle siren emblem
    ctx.fillStyle='#1a3a22';ctx.fillRect(sx,sy,sw,uh);
    const sr=Math.round(Math.min(sw,uh)*0.34);
    ctx.fillStyle='#1e7a3a';ctx.beginPath();ctx.arc(cx,cy,sr,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#a8d8a0';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,sr,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#a8d8a0';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,sr-5,0,Math.PI*2);ctx.stroke();
    // Siren star / crown shape
    ctx.fillStyle='#a8e8a0';ctx.font=`bold ${Math.round(sr*0.7)}px serif`;ctx.textAlign='center';
    ctx.fillText('\u2605',cx,cy+sr*0.28);
    ctx.fillStyle='#a8e8a0';ctx.font=`bold ${Math.round(uh*0.16)}px Arial`;
    ctx.fillText('STARBUCKS',cx,sy+uh-6);
  } else if(type==='beams'){
    // Warm cream/tan — BEAMS Japan select shop
    ctx.fillStyle='#f5e8d0';ctx.fillRect(sx,sy,sw,uh);
    // Bold clean logotype
    ctx.fillStyle='#2a1a0a';ctx.font=`bold ${Math.round(Math.min(uh*0.40,sw*0.26))}px Arial`;ctx.textAlign='center';
    ctx.fillText('BEAMS',cx,cy+Math.round(uh*0.15));
    // Thin decorative lines
    ctx.strokeStyle='#8b5a2a';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(cx-sw*0.32,cy-Math.round(uh*0.22));ctx.lineTo(cx+sw*0.32,cy-Math.round(uh*0.22));ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-sw*0.22,cy+Math.round(uh*0.28));ctx.lineTo(cx+sw*0.22,cy+Math.round(uh*0.28));ctx.stroke();
    ctx.fillStyle='#8b5a2a';ctx.font=`${Math.round(uh*0.18)}px monospace`;
    ctx.fillText('JAPAN',cx,sy+uh-7);
  } else if(type==='kickslab'){
    // KICKS LAB. — black bg, bold white serif text (like the real sign)
    ctx.fillStyle='#0a0a0a';ctx.fillRect(sx,sy,sw,uh);
    // Outer border frame
    ctx.strokeStyle='#333';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(sx+6,sy+6,sw-12,uh-12,[4]);ctx.stroke();
    // Big bold KICKS LAB. text
    const fs=Math.round(Math.min(uh*0.34,sw*0.18));
    ctx.fillStyle='#ffffff';ctx.font=`bold ${fs}px serif`;ctx.textAlign='center';
    ctx.shadowColor='rgba(255,255,255,0.18)';ctx.shadowBlur=6;
    ctx.fillText('KICKS',cx,cy-fs*0.15);
    ctx.fillText('LAB.',cx,cy+fs*1.0);
    ctx.shadowBlur=0;
    // Thin underline
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx-sw*0.3,cy+fs*0.12);ctx.lineTo(cx+sw*0.3,cy+fs*0.12);ctx.stroke();
  } else if(type==='familymart'){
    // FamilyMart — green/blue diagonal split + logotype
    // Green half (top-left)
    ctx.fillStyle='#00a040';ctx.fillRect(sx,sy,sw,uh);
    // Blue diagonal band (bottom-right)
    ctx.fillStyle='#0056a0';
    ctx.beginPath();ctx.moveTo(sx+sw*0.38,sy);ctx.lineTo(sx+sw,sy);ctx.lineTo(sx+sw,sy+uh);ctx.lineTo(sx+sw*0.18,sy+uh);ctx.closePath();ctx.fill();
    // White center band
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.moveTo(sx+sw*0.32,sy);ctx.lineTo(sx+sw*0.42,sy);ctx.lineTo(sx+sw*0.22,sy+uh);ctx.lineTo(sx+sw*0.12,sy+uh);ctx.closePath();ctx.fill();
    // "FamilyMart" logotype
    ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.round(Math.min(uh*0.20,sw*0.13))}px Arial`;
    ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=3;
    ctx.fillText('Family',cx,cy-2);ctx.fillText('Mart',cx,cy+Math.round(uh*0.22));
    ctx.shadowBlur=0;
    // Small circle logo mark
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.arc(cx,sy+uh*0.14,Math.round(sw*0.12),0,Math.PI*2);ctx.fill();
  } else if(type==='lawson'){
    // LAWSON — sky blue + white, clean convenience store look
    ctx.fillStyle='#0068b7';ctx.fillRect(sx,sy,sw,uh);
    // White top band
    ctx.fillStyle='#ffffff';ctx.fillRect(sx,sy,sw,Math.round(uh*0.28));
    // "LAWSON" bold blue text on white band
    ctx.fillStyle='#0068b7';ctx.font=`bold ${Math.round(Math.min(uh*0.22,sw*0.20))}px Arial`;
    ctx.textAlign='center';ctx.fillText('LAWSON',cx,sy+Math.round(uh*0.22));
    // Blue band highlight below white
    ctx.fillStyle='#0045a0';ctx.fillRect(sx,sy+Math.round(uh*0.28),sw,3);
    // Blue dot (trademark blue circle from Lawson logo)
    const ldot=Math.round(Math.min(sw,uh)*0.20);
    ctx.fillStyle='rgba(255,255,255,0.18)';ctx.beginPath();ctx.arc(cx,cy+Math.round(uh*0.1),ldot,0,Math.PI*2);ctx.fill();
    // "STATION" small text in white
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font=`bold ${Math.round(uh*0.13)}px Arial`;
    ctx.fillText('STATION',cx,sy+uh-Math.round(uh*0.1));
    // Horizontal decorative lines
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;
    [0.5,0.62,0.74].forEach(f=>{
      ctx.beginPath();ctx.moveTo(sx+6,sy+uh*f);ctx.lineTo(sx+sw-6,sy+uh*f);ctx.stroke();
    });
  } else if(type==='oceantokyo'){
    // OCEAN TOKYO — minimalist black/white barbershop
    ctx.fillStyle='#0a0a0a';ctx.fillRect(sx,sy,sw,uh);
    // White top stripe
    ctx.fillStyle='#ffffff';ctx.fillRect(sx,sy,sw,Math.round(uh*0.18));
    // "OCEAN" black on white top / "TOKYO" white on black
    ctx.fillStyle='#0a0a0a';ctx.font=`bold ${Math.round(Math.min(uh*0.14,sw*0.145))}px Arial`;
    ctx.textAlign='center';ctx.fillText('OCEAN',cx,sy+Math.round(uh*0.145));
    ctx.fillStyle='#ffffff';ctx.font=`bold ${Math.round(Math.min(uh*0.14,sw*0.13))}px Arial`;
    ctx.fillText('TOKYO',cx,sy+Math.round(uh*0.38));
    // Barber pole (classic red/white vertical stripes)
    const poleX=Math.round(sx+sw*0.78),poleY=sy+Math.round(uh*0.22),poleH=Math.round(uh*0.55),poleW=8;
    ctx.fillStyle='#ffffff';ctx.fillRect(poleX-poleW/2,poleY,poleW,poleH);
    for(let si=0;si<5;si+=2){ctx.fillStyle='#cc0000';ctx.fillRect(poleX-poleW/2,poleY+si*(poleH/5),poleW,poleH/5);}
    // Pole cap & base
    ctx.fillStyle='#cccccc';ctx.fillRect(poleX-poleW/2-2,poleY-4,poleW+4,5);ctx.fillRect(poleX-poleW/2-2,poleY+poleH,poleW+4,4);
    // Scissors icon (left of pole)
    const scx=Math.round(sx+sw*0.28),scy=sy+Math.round(uh*0.58);
    ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(scx-5,scy-8);ctx.lineTo(scx+5,scy+8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(scx+5,scy-8);ctx.lineTo(scx-5,scy+8);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.55)';ctx.beginPath();ctx.arc(scx,scy,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.arc(scx,scy,1.5,0,Math.PI*2);ctx.fill();
    // "BARBERSHOP" tiny label at bottom
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font=`${Math.round(uh*0.1)}px Arial`;
    ctx.textAlign='center';ctx.fillText('BARBERSHOP',cx,sy+uh-Math.round(uh*0.06));
  }
  ctx.restore();
}

function drawWindowContent(type,sx,sy,sw,sh,wx,wy,ww,wh,t){
  const cx=wx+ww/2,cy=wy+wh/2;
  ctx.save();ctx.beginPath();ctx.rect(wx+1,wy+1,ww-2,wh-2);ctx.clip();
  if(type==='supreme'){
    // Stacked box logo tees/hoodies on shelves
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(wx+1,wy+1,ww-2,wh-2);
    [[0,'#cc0000'],[1,'#ffffff'],[2,'#000000'],[3,'#cc0000'],[4,'#1a1aff']].forEach((item,i)=>{
      const itemX=wx+6+i*((ww-12)/5),itemY=wy+wh*0.3;
      ctx.fillStyle='#2a2a2a';ctx.fillRect(itemX-1,wy+4,ww/5-6,wh-10);
      ctx.fillStyle=item[1];ctx.beginPath();ctx.roundRect(itemX+2,itemY,ww/5-10,wh*0.35,[2]);ctx.fill();
      ctx.fillStyle='#fff';ctx.font=`bold ${Math.round(wh*0.12)}px Arial`;ctx.textAlign='center';
      ctx.fillText('SUP',itemX+ww/10-4,itemY+wh*0.22);
    });
  } else if(type==='bape'){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(wx+1,wy+1,ww-2,wh-2);
    // Camo items
    [[cx-28,cy-10,20,30,'#1a3a1a'],[cx+2,cy-12,18,28,'#0e2a0e'],[cx-26,cy+22,16,22,'#2a4a1a'],[cx+4,cy+20,14,20,'#1a2a0a']].forEach(([ix,iy,iw,ih,ic])=>{
      ctx.fillStyle=ic;ctx.beginPath();ctx.roundRect(ix,iy,iw,ih,[3]);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;ctx.stroke();
    });
    ctx.fillStyle='#c8a032';ctx.font=`bold ${Math.round(wh*0.14)}px monospace`;ctx.textAlign='center';
    ctx.fillText('NEW',cx,wy+wh-6);
  } else if(type==='neighborhood'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(wx+1,wy+1,ww-2,wh-2);
    // Military/biker style jacket display
    const cols=['#1a1a1a','#2a2218','#1a1a2a','#0a0a0a'];
    [[cx-20,cy-8],[cx+8,cy-10],[cx-18,cy+16],[cx+10,cy+14]].forEach(([ix,iy],i)=>{
      ctx.fillStyle=cols[i];ctx.beginPath();ctx.roundRect(ix-9,iy-12,18,26,[3,3,0,0]);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=0.8;ctx.stroke();
      // Wing emblem
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font=`bold ${Math.round(wh*0.11)}px serif`;ctx.textAlign='center';
      ctx.fillText('\u2605',ix,iy+4);
    });

// ── Pole layout (randomised per game) ──────────────────────────────────────
let poleLayout=[]; // [{x, armW, totalH}]
function initPoleLayout(){
  poleLayout=[];
  // 4 spacing patterns: tight(140-190), medium(200-270), wide(280-380), mixed
  const spacingFns=[
    ()=>140+Math.floor(Math.random()*50),   // A: 密集
    ()=>200+Math.floor(Math.random()*70),   // B: 標準
    ()=>280+Math.floor(Math.random()*100),  // C: 広め
    ()=>(Math.random()<0.5?150+Math.floor(Math.random()*60):260+Math.floor(Math.random()*80)), // D: 混在
  ];
  const spaceFn=spacingFns[Math.floor(Math.random()*spacingFns.length)];
  const span=shopWrap+60;
  let x=Math.floor(Math.random()*80); // random start offset
  while(x<span){
    const armW=28+Math.floor(Math.random()*20);   // arm width 28-48px
    const extraH=Math.floor(Math.random()*28)-8;  // height variation -8 to +20px
    const tilt=(Math.random()-0.5)*0.04;           // slight lean
    poleLayout.push({x,armW,extraH,tilt});
    x+=spaceFn();
  }
}

function drawWires(ox){
  if(poleLayout.length===0)return;
  const SW=shopWrap;
  // Wire heights (3 power lines + 1 neutral/communication)
  const wireY=[GROUND_Y-172,GROUND_Y-160,GROUND_Y-150,GROUND_Y-138];

  // ── Draw wires first (catenary curves between adjacent poles) ──
  ctx.lineWidth=0.9;
  for(let i=0;i<poleLayout.length;i++){
    const pl=poleLayout[i];
    const pn=poleLayout[(i+1)%poleLayout.length];
    const p1=((pl.x+ox%SW+SW)%SW)-60;
    const rawP2=pn.x+(i===poleLayout.length-1?SW:0);
    const p2=((rawP2+ox%SW+SW)%SW)-60;
    const mid=(p1+p2)/2;
    if(p1>W+30||p2<-80)continue;
    // Wire heights adjusted for pole height variation
    const h1=pl.extraH||0, h2=pn.extraH||0;
    wireY.forEach((wy,wi)=>{
      const sag=5+wi*2+Math.abs(p2-p1)*0.012;
      ctx.strokeStyle=wi<3?'rgba(18,16,13,0.90)':'rgba(45,38,28,0.65)';
      ctx.beginPath();
      ctx.moveTo(p1,wy-h1);
      ctx.quadraticCurveTo(mid,(wy+sag)-((h1+h2)/2),p2,wy-h2);
      ctx.stroke();
    });
  }

  // ── Draw poles on top of wires ─────────────────────────────────
  poleLayout.forEach(pl=>{
    const px=((pl.x+ox%SW+SW)%SW)-60;
    if(px<-14||px>W+14)return;
    const extraH=pl.extraH||0;
    const armW=pl.armW||36;
    const pTop=GROUND_Y-182-extraH, pBot=GROUND_Y+2;
    const tilt=pl.tilt||0;
    ctx.save();
    ctx.translate(px,0);ctx.transform(1,0,tilt,1,0,0); // slight lean
    // Drop shadow
    ctx.fillStyle='rgba(0,0,0,0.16)';ctx.fillRect(3,pTop+6,5,pBot-pTop);
    // Main pole — aged timber gradient
    const pGrad=ctx.createLinearGradient(-3,0,5,0);
    pGrad.addColorStop(0,'#3e3428');pGrad.addColorStop(0.35,'#56483a');pGrad.addColorStop(1,'#26201a');
    ctx.fillStyle=pGrad;ctx.fillRect(-3,pTop,7,pBot-pTop);
    // Wood grain
    ctx.strokeStyle='rgba(0,0,0,0.13)';ctx.lineWidth=0.4;
    for(let g=pTop+15;g<pBot-10;g+=35+Math.floor(Math.random()*20)){
      ctx.beginPath();ctx.moveTo(-3,g);ctx.lineTo(4,g+3);ctx.stroke();
    }
    // Upper cross-arm
    const arm1Y=GROUND_Y-175-extraH;
    const hw=Math.round(armW/2);
    ctx.fillStyle='#3a3028';ctx.fillRect(-hw,arm1Y,armW,4);
    ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(-hw,arm1Y,armW,1);
    // Lower cross-arm (narrower)
    const arm2Y=GROUND_Y-150-Math.round(extraH*0.6);
    const hw2=Math.round(armW*0.7/2);
    ctx.fillStyle='#332c22';ctx.fillRect(-hw2,arm2Y,hw2*2,3);
    // Diagonal braces under upper arm
    ctx.strokeStyle='#2c2618';ctx.lineWidth=1.1;
    ctx.beginPath();ctx.moveTo(0,arm1Y+4);ctx.lineTo(-hw*0.5,arm1Y+12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,arm1Y+4);ctx.lineTo(hw*0.5,arm1Y+12);ctx.stroke();
    // Insulators on upper arm
    const ins1=[-hw+3,-hw+Math.round(hw/2),hw-Math.round(hw/2),hw-3];
    ins1.forEach(dx=>{
      ctx.fillStyle='#80705a';ctx.beginPath();ctx.arc(dx,arm1Y+2,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.18)';ctx.beginPath();ctx.arc(dx-0.5,arm1Y+1,1,0,Math.PI*2);ctx.fill();
    });
    // Insulators on lower arm
    [-hw2+2,0,hw2-2].forEach(dx=>{
      ctx.fillStyle='#6e5e48';ctx.beginPath();ctx.arc(dx,arm2Y+1.5,2,0,Math.PI*2);ctx.fill();
    });
    // Pole cap
    ctx.fillStyle='#241e14';ctx.beginPath();ctx.roundRect(-4,pTop-3,8,5,[2]);ctx.fill();
    // Utility box (sometimes mid-pole)
    if((pl.x%3)===0){ctx.fillStyle='#404040';ctx.beginPath();ctx.roundRect(-5,GROUND_Y-90,10,14,[1]);ctx.fill();}
    ctx.restore();
  });
}

function lerpRGB(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t));}
function lerpCycle(dp, stops){
  // stops: array of 4 RGB arrays [night,dawn,day,sunset]
  const n=stops.length, sc=dp*n, i=Math.floor(sc)%n, j=(i+1)%n, f=sc-Math.floor(sc);
  return lerpRGB(stops[i],stops[j],f);
}

let roofCats=[], nextCatSpawn=300+Math.random()*600;

function getRooftopH(wx){
  // Find which shop the world-x falls on and return its height
  const wrapWx=((wx%shopWrap)+shopWrap)%shopWrap;
  for(const s of shops){if(wrapWx>=s.x&&wrapWx<s.x+s.w)return s.h;}
  return 148;
}

function spawnRoofCat(){
  const type=Math.random()<0.40?'sleep':'walk';
  const wx=Math.floor(Math.random()*shopWrap);
  const h=getRooftopH(wx);
  const catDir=Math.random()<0.5?1:-1;
  const spd=type==='walk'?(0.15+Math.random()*0.25):0;
  roofCats.push({wx,h,type,spd,dir:catDir,ph:Math.random()*Math.PI*2,life:0,alpha:0});
}

function updateRoofCats(){
  const isDay=(bgDayPhase>0.28&&bgDayPhase<0.72);
  nextCatSpawn-=dt;
  if(nextCatSpawn<=0&&roofCats.length<10){
    spawnRoofCat();
    nextCatSpawn=140+Math.random()*280;
  }
  roofCats.forEach(c=>{
    c.life+=dt;
    c.ph+=0.055*dt;
    if(c.type==='walk') c.wx=((c.wx-c.spd*(c.dir||1)*dt)%shopWrap+shopWrap)%shopWrap;
    // Fade in during day, fade out at night
    if(isDay) c.alpha=Math.min(1,c.alpha+0.025*dt);
    else c.alpha=Math.max(0,c.alpha-0.015*dt);
  });
  roofCats=roofCats.filter(c=>!(c.alpha<0.01&&!isDay));
}

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.12)';ctx.beginPath();ctx.ellipse(sx,sy+1,14,3,0,0,Math.PI*2);ctx.fill();
    // ── Flip when dir===1 (moving left) so cat faces left ──
    if(dir===1){ctx.save();ctx.translate(sx*2,0);ctx.scale(-1,1);}
    // Tail (in flipped space ends up on the RIGHT / behind the leftward cat)
    ctx.strokeStyle=fc;ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(sx-9,sy-5);ctx.bezierCurveTo(sx-17,sy-2,sx-20,sy-14,sx-14,sy-22);ctx.stroke();
    ctx.strokeStyle=sc2;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(sx-9,sy-5);ctx.bezierCurveTo(sx-17,sy-2,sx-20,sy-14,sx-14,sy-22);ctx.stroke();
    // Body
    ctx.fillStyle=fc;ctx.strokeStyle=sc2;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.ellipse(sx,sy-7,11,6,-0.1,0,Math.PI*2);ctx.fill();ctx.stroke();
    // Neck
    ctx.beginPath();ctx.ellipse(sx+9,sy-10,5,4,0.3,0,Math.PI*2);ctx.fill();ctx.stroke();
    // Head
    ctx.beginPath();ctx.arc(sx+14,sy-13,6,0,Math.PI*2);ctx.fill();ctx.stroke();
    // Ears (pointed, cream with pink inside)
    ctx.fillStyle=fc;ctx.strokeStyle=sc2;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx+10,sy-18);ctx.lineTo(sx+12,sy-24);ctx.lineTo(sx+16,sy-19);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+16,sy-18);ctx.lineTo(sx+18,sy-23);ctx.lineTo(sx+21,sy-18);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,165,165,0.55)';
    ctx.beginPath();ctx.moveTo(sx+11,sy-19);ctx.lineTo(sx+12.5,sy-22);ctx.lineTo(sx+15,sy-19);ctx.closePath();ctx.fill();
    // Legs
    ctx.strokeStyle=sc2;ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(sx+6,sy-3);ctx.lineTo(sx+4+lc,sy+4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+9,sy-3);ctx.lineTo(sx+11-lc,sy+4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx-5,sy-3);ctx.lineTo(sx-7-lc*0.6,sy+4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx-2,sy-3);ctx.lineTo(sx+lc*0.6,sy+4);ctx.stroke();
    // Eye (soft teal / aqua — gentle feel)
    ctx.fillStyle='#72c8c0';ctx.beginPath();ctx.arc(sx+16,sy-14,2.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a3838';ctx.beginPath();ctx.arc(sx+16.6,sy-14,1.1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.arc(sx+15.6,sy-14.8,0.6,0,Math.PI*2);ctx.fill();
    // Nose
    ctx.fillStyle='rgba(255,140,150,0.9)';ctx.beginPath();ctx.arc(sx+20,sy-12,1.3,0,Math.PI*2);ctx.fill();
    // Whiskers
    ctx.strokeStyle='rgba(175,165,155,0.55)';ctx.lineWidth=0.9;
    [[sx+19,sy-12,sx+27,sy-11],[sx+19,sy-12,sx+27,sy-13],[sx+19,sy-12,sx+27,sy-15]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
    if(dir===1)ctx.restore(); // ── end flip ──
  } else {
    // ── 寝ている猫 (sleeping cat, curled up) ──
    ctx.fillStyle='rgba(0,0,0,0.10)';ctx.beginPath();ctx.ellipse(sx,sy+1,13,3,0,0,Math.PI*2);ctx.fill();
    // Curled body
    ctx.fillStyle=fc;ctx.strokeStyle=sc2;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.ellipse(sx,sy-5,12,7,0.15,0,Math.PI*2);ctx.fill();ctx.stroke();
    // Head tucked to right side
    ctx.beginPath();ctx.arc(sx+10,sy-7,5.5,0,Math.PI*2);ctx.fill();ctx.stroke();
    // Ear
    ctx.fillStyle=fc;ctx.strokeStyle=sc2;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx+7,sy-12);ctx.lineTo(sx+9,sy-16);ctx.lineTo(sx+12,sy-12);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,165,165,0.55)';
    ctx.beginPath();ctx.moveTo(sx+8,sy-12);ctx.lineTo(sx+9,sy-15);ctx.lineTo(sx+11,sy-12);ctx.closePath();ctx.fill();
    // Tail wrapped around body (cream)
    ctx.strokeStyle=fc;ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(sx-11,sy-3);ctx.bezierCurveTo(sx-13,sy+3,sx+6,sy+5,sx+10,sy-1);ctx.stroke();
    ctx.strokeStyle=sc2;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(sx-11,sy-3);ctx.bezierCurveTo(sx-13,sy+3,sx+6,sy+5,sx+10,sy-1);ctx.stroke();
    // Closed eye (thin arc, gentle)
    ctx.strokeStyle='rgba(120,100,85,0.5)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(sx+12,sy-7,2,Math.PI,0);ctx.stroke();
    // Zzz bubbles
    const zA=0.3+Math.sin(ph*0.08)*0.12;
    ctx.fillStyle=`rgba(160,200,240,${zA})`;
    ctx.font='bold 7px Arial';ctx.textAlign='left';ctx.fillText('z',sx+16,sy-14);
    ctx.font='bold 5px Arial';ctx.fillStyle=`rgba(160,200,240,${zA*0.7})`;ctx.fillText('z',sx+20,sy-19);
  }
  ctx.restore();
}

// =====================================================
//  Rooftop Rats (night, 3 patterns)
// =====================================================
let roofRats=[], nextRatSpawn=400+Math.random()*800;

function spawnRoofRat(){
  const dp=bgDayPhase;
  if(dp>0.24&&dp<0.76)return; // night only
  const pats=['solo','solo','pair','sniff'];
  const pat=pats[Math.floor(Math.random()*pats.length)];
  const wx=Math.floor(Math.random()*shopWrap);
  const h=getRooftopH(wx);
  const spd=(pat==='sniff'?0.09:0.3+Math.random()*0.55)*(Math.random()<0.5?1:-1);
  roofRats.push({wx,h,pat,spd,ph:Math.random()*Math.PI*2,life:0,alpha:0,sniffT:0});
  if(pat==='pair'){
    const wx2=(wx+18+Math.floor(Math.random()*24))%shopWrap;
    const h2=getRooftopH(wx2);
    roofRats.push({wx:wx2,h:h2,pat:'solo',spd:(0.28+Math.random()*0.4)*(spd>0?1:-1),
      ph:Math.random()*Math.PI*2,life:0,alpha:0,sniffT:0});
  }
}

function updateRoofRats(){
  const dp=bgDayPhase;
  const isNight=(dp<0.26||dp>0.74);
  nextRatSpawn-=dt;
  if(nextRatSpawn<=0&&roofRats.length<12){
    spawnRoofRat();
    nextRatSpawn=120+Math.random()*240; // ~2-6 seconds between rats
  }
  roofRats.forEach(r=>{
    r.life+=dt;r.ph+=0.12*dt;
    if(r.pat==='sniff'){
      r.sniffT+=dt;
      if(r.sniffT<70)r.wx=(r.wx+r.spd*dt+shopWrap)%shopWrap;
      else if(r.sniffT>130)r.sniffT=0;
    } else {
      r.wx=(r.wx+r.spd*dt+shopWrap)%shopWrap;
    }
    if(r.life<40)r.alpha=r.life/40;
    else if(!isNight)r.alpha=Math.max(0,r.alpha-0.025);
    else r.alpha=Math.min(1,r.alpha+0.025);
  });
  roofRats=roofRats.filter(r=>r.alpha>0.01);
}

function drawSingleRat(sx,sy,pat,ph,alpha,dir=1){
  if(alpha<0.05)return;
  ctx.save();ctx.globalAlpha=alpha;
  const col='#2a2028';
  const sniffBob=(pat==='sniff')?Math.sin(ph*3)*2:0;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.ellipse(sx,sy+1,12,2.5,0,0,Math.PI*2);ctx.fill();
  // Flip if moving left (dir===-1)
  if(dir===-1){ctx.save();ctx.translate(sx*2,0);ctx.scale(-1,1);}
  // Tail
  ctx.strokeStyle='#4a3845';ctx.lineWidth=1.8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(sx-9,sy-3);
  ctx.bezierCurveTo(sx-18,sy+2,sx-24,sy-4,sx-28,sy-1);ctx.stroke();
  // Body
  ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(sx,sy-5+sniffBob,10,5,-0.08,0,Math.PI*2);ctx.fill();
  // Head + snout
  ctx.beginPath();ctx.ellipse(sx+12,sy-7+sniffBob,6,4.5,0.15,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(sx+18,sy-6+sniffBob,3,2.5,0.2,0,Math.PI*2);ctx.fill();
  // Ear
  ctx.beginPath();ctx.arc(sx+8,sy-11+sniffBob,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(200,140,150,0.6)';ctx.beginPath();ctx.arc(sx+8,sy-11+sniffBob,2,0,Math.PI*2);ctx.fill();
  // Legs
  ctx.strokeStyle=col;ctx.lineWidth=1.8;
  const lc=Math.sin(ph*4)*2.5;
  [[sx+4,sy-1,sx+3+lc,sy+4],[sx+7,sy-1,sx+8-lc,sy+4],
   [sx-3,sy-1,sx-4-lc*0.6,sy+4],[sx-1,sy-1,sx+lc*0.6,sy+4]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  // Red eye
  ctx.fillStyle='#cc1122';ctx.beginPath();ctx.arc(sx+15,sy-7+sniffBob,1.2,0,Math.PI*2);ctx.fill();
  // Whiskers
  ctx.strokeStyle='rgba(220,220,220,0.5)';ctx.lineWidth=0.7;
  [[sx+18,sy-7+sniffBob,sx+26,sy-8+sniffBob],
   [sx+18,sy-6+sniffBob,sx+26,sy-5+sniffBob],
   [sx+18,sy-7+sniffBob,sx+26,sy-10+sniffBob]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  if(dir===-1)ctx.restore(); // end flip
  ctx.restore();
}

function drawRoofRats(){
  const sw=shopWrap;
  roofRats.forEach(r=>{
    const rx=((r.wx+nearOff%sw+sw)%sw)-60;
    if(rx<-50||rx>W+50)return;
    const rDir=r.spd>=0?1:-1; // positive spd=rightward=face right
    drawSingleRat(rx,GROUND_Y-r.h,r.pat,r.ph,r.alpha,rDir);
  });
}

// =====================================================
//  Night Bats (3 patterns: solo / cluster / dive)
// =====================================================
let bats=[], nextBatSpawn=300+Math.random()*600;

function spawnBat(){
  const dp=bgDayPhase;
  if(dp>0.24&&dp<0.76)return; // night only
  const pats=['solo','cluster','dive'];
  const pat=pats[Math.floor(Math.random()*pats.length)];
  const baseY=70+Math.random()*170;
  if(pat==='cluster'){
    const n=3+Math.floor(Math.random()*2);
    for(let i=0;i<n;i++){
      bats.push({x:W+70+i*24,y:baseY+Math.sin(i*1.5)*22,
        spd:2.0+Math.random()*1.2,ph:Math.random()*Math.PI*2,
        amp:10+Math.random()*14,diveY:0,life:0,alpha:0});
    }
  } else if(pat==='dive'){
    bats.push({x:W+60,y:55+Math.random()*70,spd:3.2+Math.random()*1.6,
      ph:0,amp:0,diveY:baseY+90,life:0,alpha:0});
  } else {
    bats.push({x:W+60,y:baseY,spd:1.6+Math.random()*1.4,
      ph:Math.random()*Math.PI*2,amp:16+Math.random()*20,diveY:0,life:0,alpha:0});
  }
}

function updateBats(){
  const dp=bgDayPhase;
  const isNight=(dp<0.26||dp>0.74);
  nextBatSpawn-=dt;
  if(nextBatSpawn<=0&&bats.length<14){
    spawnBat();
    nextBatSpawn=160+Math.random()*380;
  }
  bats.forEach(b=>{
    b.life+=dt;b.ph+=0.09*dt;b.x-=b.spd*dt;
    if(b.diveY>0){
      b.y+=((b.diveY-b.y)*0.035+Math.sin(b.life*0.14)*3)*dt;
    } else {
      b.y+=Math.sin(b.ph)*b.amp*0.055*dt;
    }
    if(b.life<30)b.alpha=b.life/30;
    else if(!isNight)b.alpha=Math.max(0,b.alpha-0.03);
    else b.alpha=Math.min(1,b.alpha+0.04);
  });
  bats=bats.filter(b=>b.x>-80&&b.alpha>0.01);
}

function drawSingleBat(bx,by2,ph,alpha){
  if(alpha<0.05)return;
  ctx.save();ctx.globalAlpha=alpha;
  const col='#1a1520';
  const flap=Math.sin(ph*6)*0.65;
  const wy=by2+flap*8;
  // Body
  ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(bx,by2,5,3.5,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.beginPath();ctx.arc(bx+5,by2-1.5,3,0,Math.PI*2);ctx.fill();
  // Ears
  ctx.beginPath();ctx.moveTo(bx+3,by2-4);ctx.lineTo(bx+5,by2-8);ctx.lineTo(bx+7,by2-4);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+6,by2-4);ctx.lineTo(bx+8,by2-7);ctx.lineTo(bx+10,by2-4);ctx.closePath();ctx.fill();
  // Left wing membrane
  ctx.beginPath();
  ctx.moveTo(bx-1,by2);ctx.lineTo(bx-18,wy-2);ctx.lineTo(bx-14,wy+4);
  ctx.lineTo(bx-8,wy+1);ctx.lineTo(bx-4,wy+5);ctx.closePath();ctx.fill();
  // Right wing membrane
  ctx.beginPath();
  ctx.moveTo(bx+1,by2);ctx.lineTo(bx+18,wy-2);ctx.lineTo(bx+14,wy+4);
  ctx.lineTo(bx+8,wy+1);ctx.lineTo(bx+4,wy+5);ctx.closePath();ctx.fill();
  // Eye
  ctx.fillStyle='#cc0011';ctx.beginPath();ctx.arc(bx+6,by2-2,1,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBats(){
  bats.forEach(b=>drawSingleBat(b.x,b.y,b.ph,b.alpha));
}

// =====================================================
//  Birds — 3 patterns
// =====================================================
let birds=[], nextBirdSpawn=300+Math.random()*500;
// Pattern types: 'solo'(1 bird), 'vee'(V-formation 5 birds), 'flock'(loose cluster 4 birds)
function spawnBird(){
  const patterns=['solo','solo','vee','flock'];
  const pat=patterns[Math.floor(Math.random()*patterns.length)];
  const y=40+Math.random()*140; // high in sky
  const spd=0.6+Math.random()*0.8;
  birds.push({pat,x:W+60,y,spd,ph:Math.random()*Math.PI*2,life:0});
}
function updateBirds(){
  nextBirdSpawn-=dt;
  if(nextBirdSpawn<=0){spawnBird();nextBirdSpawn=320+Math.random()*480;}
  birds.forEach(b=>{b.x-=b.spd*(state==='playing'?1+speed*0.05:0.7)*dt;b.ph+=0.09*dt;b.life+=dt;});
  birds=birds.filter(b=>b.x>-120);
}
function drawOneBird(bx,by,sz,ph,alpha){
  // Simple silhouette: two curved wings meeting at body center
  const flap=Math.sin(ph)*sz*0.5;
  ctx.globalAlpha=alpha;
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=sz*0.22;ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(bx-sz,by+flap);
  ctx.quadraticCurveTo(bx-sz*0.45,by-flap*0.6,bx,by);
  ctx.quadraticCurveTo(bx+sz*0.45,by-flap*0.6,bx+sz,by+flap);
  ctx.stroke();
  // Small body dot
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(bx,by,sz*0.18,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
}
function drawBirds(t){
  birds.forEach(b=>{
    const fade=Math.min(1,Math.min(b.life/40,(b.x+100)/100));
    if(b.pat==='solo'){
      // Single bird, medium size, gentle undulating path
      const wavY=b.y+Math.sin(b.ph*0.4)*12;
      drawOneBird(b.x,wavY,8,b.ph,0.82*fade);
    } else if(b.pat==='vee'){
      // V-formation: 5 birds — leader + 2 pairs behind
      const sz=6;
      const offsets=[
        [0,0],[  -20,12],[20,12],[ -38,24],[38,24]
      ];
      offsets.forEach(([dx,dy],i)=>{
        const lagPh=b.ph-i*0.18;
        drawOneBird(b.x+dx,b.y+dy,sz,lagPh,0.78*fade);
      });
    } else {
      // Loose flock: 4 birds in scattered cluster
      const flock=[
        [0,0,7,0],[  -22,-10,5,0.4],[ 18,8,5,-0.3],[ -8,18,6,0.8]
      ];
      flock.forEach(([dx,dy,sz,phOff])=>{
        drawOneBird(b.x+dx,b.y+dy,sz,b.ph+phOff,0.75*fade);
      });
    }
  });
}

function drawBg(t){
  // Advance day phase (full cycle ≈ 5000 frames ≈ 83s at 60fps)
  bgDayPhase=(bgDayPhase+dt/5000)%1;
  const dp=bgDayPhase;

  // ── SKY GRADIENT ─────────────────────────────────────────────
  const skyTop=[
    [3,1,16],    // night
    [60,20,60],  // dawn
    [20,70,180], // day
    [15,8,45],   // sunset
  ];
  const skyBot=[
    [30,6,53],   // night
    [255,100,40],// dawn
    [90,145,240],// day
    [200,60,15], // sunset
  ];
  const stC=lerpCycle(dp,skyTop), sbC=lerpCycle(dp,skyBot);
  const sky=ctx.createLinearGradient(0,0,0,GROUND_Y);
  sky.addColorStop(0,rgbStr(stC));sky.addColorStop(1,rgbStr(sbC));
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,GROUND_Y);

  // ── HORIZON GLOW (dawn/sunset) ───────────────────────────────
  const hGlowA=Math.sin(dp*Math.PI*2)*0.5+0.5; // peaks at dawn+sunset
  const isRising=dp<0.5;
  if(hGlowA>0.05){
    const hg=ctx.createLinearGradient(0,GROUND_Y-80,0,GROUND_Y);
    const hCol=isRising?`rgba(255,120,50,${hGlowA*0.55})`:`rgba(220,70,20,${hGlowA*0.55})`;
    hg.addColorStop(0,'rgba(0,0,0,0)');hg.addColorStop(1,hCol);
    ctx.fillStyle=hg;ctx.fillRect(0,GROUND_Y-80,W,80);
  }

  // ── STARS (visible at night, fade at dawn/dusk) ──────────────
  const starA=Math.max(0,1-Math.sin(Math.max(0,(dp-0.06))*Math.PI/0.38));
  if(starA>0.02){
    [[60,14],[140,30],[250,8],[380,22],[500,12],[620,36],[710,17],[790,5],[820,28],
     [180,8],[310,40],[450,18],[560,6],[670,32],[730,10],[850,25],[920,14],[55,38]
    ].forEach(([sx,sy])=>{
      const f=Math.sin(t*0.025+sx)*0.5+0.8;
      ctx.fillStyle=`rgba(255,255,255,${f*0.55*starA})`;
      ctx.beginPath();ctx.arc(sx,sy,f*0.8,0,Math.PI*2);ctx.fill();
    });
  }

  // ── MOON (crescent) ─────────────────────────────────────────
  // Moon: fade in at dusk (dp>0.74→0.82), full at night, fade out at dawn (dp<0.18→0.26)
  let moonA=0;
  if(dp<0.18)moonA=1;
  else if(dp<0.26)moonA=1-(dp-0.18)/0.08;
  else if(dp>0.82)moonA=1;
  else if(dp>0.74)moonA=(dp-0.74)/0.08;
  if(moonA>0.04){
    const mx=680,my=45,mr=20;
    ctx.save();ctx.globalAlpha=moonA;
    // Outer glow
    const mg=ctx.createRadialGradient(mx,my,mr-2,mx,my,mr+14);
    mg.addColorStop(0,`rgba(200,230,255,0.3)`);mg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(mx,my,mr+14,0,Math.PI*2);ctx.fill();
    // Full moon circle
    ctx.shadowColor='#cce8ff';ctx.shadowBlur=16;
    ctx.fillStyle='#deeeff';ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // Crescent shadow overlay (use sky top colour)
    ctx.fillStyle=rgbStr(stC);
    ctx.beginPath();ctx.arc(mx+11,my-2,mr-2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // ── SUN (visible in day+dawn+sunset) ────────────────────────
  const sunA=Math.sin(Math.max(0,(dp-0.10))*Math.PI/0.80);
  if(sunA>0.04){
    // Sun arc: rises from left (dawn ~0.25) peaks center (day ~0.5) sets right (sunset ~0.75)
    const arc=(dp-0.10)/0.80; // 0..1 across sunrise to sunset
    const sx=W*(0.1+arc*0.82),sy=GROUND_Y*(0.65-0.55*Math.sin(arc*Math.PI));
    const isDay=dp>0.3&&dp<0.7;
    const sunCol=isDay?[255,240,100]:[255,150,50];
    ctx.save();ctx.globalAlpha=Math.min(1,sunA)*0.95;
    // Outer corona
    const corona=ctx.createRadialGradient(sx,sy,8,sx,sy,50);
    corona.addColorStop(0,`rgba(${sunCol},0.35)`);
    corona.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=corona;ctx.beginPath();ctx.arc(sx,sy,50,0,Math.PI*2);ctx.fill();
    // Inner glow

  }

  // ── CLOUDS (fluffy, daytime) ────────────────────────────────
  const cloudA=Math.max(0,Math.sin(Math.max(0,(dp-0.18))*Math.PI/0.64));
  if(cloudA>0.03){
    cloudOff=(cloudOff-speed*0.05*dt+CLOUD_W)%CLOUD_W;
    CLOUD_STRIP.forEach(p=>{
      let cx2=((p.x+cloudOff)%CLOUD_W);

  farOff-=speed*0.15*dt;farBuildings.forEach(b=>drawBuilding(b,farOff));

  drawBirds(t);drawBats();drawWires(nearOff);nearOff-=speed*0.72*dt;shops.forEach(s=>drawShop(s,nearOff,t));drawRoofCats();drawRoofRats();

  // ── NEON SIGNS (night only) ──────────────────────────────────


  // ── ROAD ─────────────────────────────────────────────────────
  const isDark=dp<0.2||dp>0.8;
  const roadTop=isDark?'#1c1c1c':'#282828';

  ctx.fillStyle='#363636';ctx.fillRect(0,GROUND_Y,W,4);ctx.fillStyle='#4a4a4a';ctx.fillRect(0,GROUND_Y,W,1);
}

let obstacles=[],nextObstDist=360;
function obstSize(type){
  if(type==='rat'){return{w:44,h:28};}
  if(type==='cigarette'){return{w:26,h:38};}
  if(type==='can'){return{w:28,h:46};}
  if(type==='bag'){return{w:42,h:52};}
  if(type==='crepe'){return{w:52,h:42};}
  if(type==='tourist'){return{w:32,h:62};}
  return{w:30,h:40};
}
function spawnObstacle(){
  const st=getStage(distanceMeter);
  const isDay=(bgDayPhase>0.22&&bgDayPhase<0.78);
  // Day: bag 40%, hat 40%, tourist 20%  Night: cigarette 40%, can 40%, rat 20%
  const dayPool=['bag','bag','crepe','crepe','tourist'];
  const nightPool=['cigarette','cigarette','can','can','rat'];
  const pool=isDay?dayPool:nightPool;
  const type=pool[Math.floor(Math.random()*pool.length)];
  const {w,h}=obstSize(type);
  obstacles.push({type,w,h,x:W+10,y:GROUND_Y+4-h,phase:0});
  if(st.dblChance>0&&Math.random()<st.dblChance){
    const pool2=isDay?['bag','crepe','tourist']:['cigarette','can','rat'];
    const t2=pool2.filter(t=>t!==type)[Math.floor(Math.random()*2)]||pool2[0];
    const {w:w2,h:h2}=obstSize(t2);
    const gap=22+Math.floor(Math.random()*32);
    obstacles.push({type:t2,w:w2,h:h2,x:W+10+w+gap,y:GROUND_Y+4-h2,phase:0});
  }
}
function updateObstacles(){
  const st=getStage(distanceMeter);nextObstDist-=speed*dt;
  if(nextObstDist<=0){spawnObstacle();nextObstDist=(st.obstMin+Math.random()*st.obstRand);}
  obstacles.forEach(o=>{o.x-=speed*dt;o.phase+=0.08*dt;});obstacles=obstacles.filter(o=>o.x+o.w>-20);
}

    });

  } else if(o.type==='crepe'){

    ctx.beginPath();ctx.ellipse(cx-8,gy+2,12,4,-0.1,0,Math.PI*2);ctx.fill();
    // ── Scattered toppings near opening ──

    });
    // ── Crepe cone lying on its side (wide opening LEFT, tip RIGHT) ──

    for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(-16,0,3+i*1.6,Math.PI*1.2,Math.PI*0.2);ctx.stroke();}

    ctx.beginPath();ctx.arc(-21,5,3.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // ── Chocolate drizzle trails from cone opening ──

    ctx.beginPath();ctx.moveTo(cx-18,gy-4);ctx.bezierCurveTo(cx-14,gy-7,cx-8,gy-5,cx-4,gy-2);ctx.stroke();
    ctx.restore();
  } else if(o.type==='tourist'){
    // ── 観光客 (tourist with camera) ──
    const ph=o.phase;
    const bx2=cx-o.w/2,fy=by+o.h; // foot Y
    // Ground shadow
    ctx.fillStyle='rgba(0,0,0,0.22)';ctx.beginPath();ctx.ellipse(cx,fy+3,12,4,0,0,Math.PI*2);ctx.fill();
    // Legs (slight walk cycle)
    const lc=Math.sin(ph*2)*4;
    ctx.strokeStyle='#5a8a5a';ctx.lineWidth=5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cx-3,fy-20);ctx.lineTo(cx-5+lc,fy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+3,fy-20);ctx.lineTo(cx+5-lc,fy);ctx.stroke();
    // Shoes
    ctx.fillStyle='#ffffff';
    [[cx-5+lc,fy],[cx+5-lc,fy]].forEach(([sx,sy])=>{
      ctx.beginPath();ctx.ellipse(sx,sy,5,2.5,0,0,Math.PI*2);ctx.fill();
    });
    // Shorts (touristy khaki)
    ctx.fillStyle='#c8a050';ctx.beginPath();ctx.roundRect(cx-9,fy-26,18,10,[2,2,0,0]);ctx.fill();
    // Body — loud tourist shirt (Hawaiian-ish)

    shirtG.addColorStop(0,'#e05888');shirtG.addColorStop(0.5,'#e87830');shirtG.addColorStop(1,'#e05888');
    ctx.fillStyle=shirtG;ctx.beginPath();ctx.roundRect(cx-9,fy-48,18,22,[3,3,0,0]);ctx.fill();
    // Shirt pattern dots
    ctx.fillStyle='rgba(255,255,255,0.2)';
    [[-4,-40],[3,-36],[-2,-32],[5,-43]].forEach(([dx,dy])=>{
      ctx.beginPath();ctx.arc(cx+dx,fy+dy,1.5,0,Math.PI*2);ctx.fill();
    });

    ctx.beginPath();ctx.moveTo(cx-9,fy-44);ctx.lineTo(cx-13,fy-52);ctx.stroke(); // left arm up
    ctx.beginPath();ctx.moveTo(cx+9,fy-44);ctx.lineTo(cx+13,fy-52);ctx.stroke(); // right arm up
    // Camera body (black rectangular)
    ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.roundRect(cx-10,fy-60,20,12,[2]);ctx.fill();
    ctx.fillStyle='#333';ctx.beginPath();ctx.roundRect(cx-9,fy-59,18,10,[1]);ctx.fill();
    // Lens
    ctx.fillStyle='#0a0a2a';ctx.beginPath();ctx.arc(cx,fy-54,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(100,150,255,0.5)';ctx.beginPath();ctx.arc(cx-1,fy-55,2,0,Math.PI*2);ctx.fill();
    // Flash light
    ctx.fillStyle='#ffe000';ctx.beginPath();ctx.arc(cx+7,fy-57,2,0,Math.PI*2);ctx.fill();

      ctx.fillStyle='rgba(255,230,0,0.7)';ctx.beginPath();ctx.arc(cx+7,fy-57,4,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    // Head (facing camera / hidden behind camera)
    ctx.fillStyle='#f5c89a';ctx.beginPath();ctx.arc(cx,fy-62,7,0,Math.PI*2);ctx.fill();
    // Tourist hat (wide-brim straw hat)
    ctx.fillStyle='#d4a820';
    ctx.beginPath();ctx.ellipse(cx,fy-68,10,4,0,0,Math.PI*2);ctx.fill(); // brim
    ctx.beginPath();ctx.arc(cx,fy-70,6,Math.PI,0);ctx.fill(); // crown
    // Hat band
    ctx.strokeStyle='#8b4010';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx-6,fy-68);ctx.lineTo(cx+6,fy-68);ctx.stroke();
    // Fanny pack / camera strap
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx-9,fy-50);ctx.lineTo(cx+9,fy-50);ctx.stroke();
    // Map sticking out of pocket (tourist detail)
    ctx.fillStyle='#fffde8';ctx.beginPath();ctx.roundRect(cx+6,fy-36,8,10,[1]);ctx.fill();
    ctx.strokeStyle='#aaa';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(cx+6,fy-33);ctx.lineTo(cx+14,fy-33);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+6,fy-30);ctx.lineTo(cx+14,fy-30);ctx.stroke();
  }
}

const SNEAKER_TYPES=[
  {id:'gold',  color:'#FFD700',accent:'#FF8C00',shine:'#FFF8A0',value:1000,weight:5 },
  {id:'red',   color:'#FF3333',accent:'#BB0000',shine:'#FF9999',value:500, weight:15},
  {id:'green', color:'#33CC44',accent:'#117722',shine:'#99FFAA',value:300, weight:30},
  {id:'blue',  color:'#3388FF',accent:'#0044BB',shine:'#AACCFF',value:100, weight:50},
];
function pickSneakerType(){
  const total=SNEAKER_TYPES.reduce((s,t)=>s+t.weight,0);
  let r=Math.random()*total;
  for(const t of SNEAKER_TYPES){r-=t.weight;if(r<=0)return t;}
  return SNEAKER_TYPES[3];
}
let sneakerItems=[],nextSneakerDist=200+Math.random()*150;
const SNK_HEIGHTS=()=>[GROUND_Y-42,GROUND_Y-88,GROUND_Y-138,GROUND_Y-190];
function spawnSneaker(forced){
  const type=pickSneakerType();
  const ys=SNK_HEIGHTS();
  sneakerItems.push({...type,x:W+10,y:ys[Math.floor(Math.random()*ys.length)],w:48,h:46,phase:Math.random()*Math.PI*2,collected:false});
}
function spawnBonusSneakers(){
  const ys=SNK_HEIGHTS();
  for(let i=0;i<8;i++){
    const type=pickSneakerType();
    sneakerItems.push({...type,x:W+40+i*110+Math.random()*30,y:ys[Math.floor(Math.random()*ys.length)],w:48,h:46,phase:Math.random()*Math.PI*2,collected:false});
  }
}
function updateSneakers(){
  nextSneakerDist-=speed*dt;
  if(nextSneakerDist<=0&&sneakerItems.length<6){spawnSneaker();nextSneakerDist=220+Math.random()*200;}
  sneakerItems.forEach(s=>{s.x-=speed*dt;s.phase+=0.055*dt;});
  sneakerItems=sneakerItems.filter(s=>s.x+s.w>-20&&!s.collected);
}
function checkSneakerCollect(){
  const p=player.getHitbox();
  sneakerItems.forEach(s=>{
    if(!s.collected&&p.x+p.w>s.x&&p.x<s.x+s.w&&p.y+p.h>s.y+Math.sin(s.phase)*5&&p.y<s.y+s.h+Math.sin(s.phase)*5){
      s.collected=true;
      const pts=s.value*scoreMultiplier;
      sneakerScore+=pts;
      scoreEl.textContent=getDisplayScore();
      if(s.id==='gold')sfxGoldCollect();else sfxCollect();
      spawnParticles(s.x+s.w/2,s.y+s.h/2,'star',s.id==='gold'?24:14);
      // Floating score text
      coinTexts.push({x:s.x+s.w/2,y:s.y,text:'+'+pts,life:1,vy:-1.6,color:s.color});
    }
  });
}
let coinTexts=[];
function drawCoinTexts(){
  coinTexts.forEach(ct=>{
    ctx.save();ctx.globalAlpha=ct.life;
    ctx.fillStyle=ct.color||'#ffe000';ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.shadowColor=ct.color||'#ff8800';ctx.shadowBlur=8;

function drawSneaker(s,t){
  const fl=Math.sin(s.phase)*5, sx=s.x, sy=s.y+fl, sw=s.w, sh=s.h;
  const {color,accent,shine,value,id}=s;

  // Value label removed per user request

  // ── Key reference points ──
  const soleBot = sy+sh;
  const soleTop = soleBot-8;
  const midBot  = soleTop;
  const midTop  = soleTop-7;
  const bodyBot = midTop+1;
  const collarHeel = sy+2;
  const collarMid  = sy+sh*0.18;
  const toeNX = sx+sw+3;
  const toeNY = bodyBot-sh*0.26;

  // ── OUTSOLE ──
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=6;
  ctx.fillStyle='#111111';
  ctx.beginPath();
  ctx.moveTo(sx+2,soleTop);ctx.lineTo(sx+sw-1,soleTop);
  ctx.quadraticCurveTo(toeNX+3,soleTop+3,toeNX+1,soleBot-2);
  ctx.lineTo(sx+1,soleBot);
  ctx.quadraticCurveTo(sx-4,soleBot-1,sx+2,soleTop);
  ctx.closePath();ctx.fill();ctx.restore();

  // ── MIDSOLE ──
  const midG=ctx.createLinearGradient(sx,midTop,sx,midBot);
  midG.addColorStop(0,'#fafafa');midG.addColorStop(1,'#d4d4d4');
  ctx.fillStyle=midG;
  ctx.beginPath();
  ctx.moveTo(sx+2,midTop);ctx.lineTo(sx+sw-1,midTop);
  ctx.quadraticCurveTo(toeNX+2,midTop+4,toeNX,soleTop);
  ctx.lineTo(sx+1,soleTop);
  ctx.quadraticCurveTo(sx-3,midTop+2,sx+2,midTop);
  ctx.closePath();ctx.fill();

  // ── MAIN UPPER ──
  const upG=ctx.createLinearGradient(sx,collarHeel,sx+sw*0.5,bodyBot);
  upG.addColorStop(0,shine);upG.addColorStop(0.35,color);upG.addColorStop(1,accent);
  ctx.save();ctx.shadowColor=color;ctx.shadowBlur=16;
  ctx.fillStyle=upG;
  ctx.beginPath();
  ctx.moveTo(sx+2,bodyBot);ctx.lineTo(sx+sw,bodyBot);
  ctx.quadraticCurveTo(toeNX+3,bodyBot-3,toeNX,toeNY);
  ctx.lineTo(sx+sw*0.60,collarMid);
  ctx.quadraticCurveTo(sx+sw*0.30,collarHeel+2,sx+3,collarHeel);
  ctx.quadraticCurveTo(sx-4,bodyBot-sh*0.22,sx+2,bodyBot);
  ctx.closePath();ctx.fill();ctx.restore();

  // ── ANKLE COLLAR rim ──
  ctx.save();ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(toeNX-1,toeNY);ctx.lineTo(sx+sw*0.60,collarMid);
  ctx.quadraticCurveTo(sx+sw*0.30,collarHeel+2,sx+3,collarHeel);ctx.stroke();
  ctx.restore();

  // ── TONGUE ──
  const tgX=sx+sw*0.30, tgW=sw*0.23;
  const tgTop=collarMid+1, tgBot=bodyBot-1;
  const tgG=ctx.createLinearGradient(tgX,tgTop,tgX+tgW,tgBot);
  tgG.addColorStop(0,'#f8f8f8');tgG.addColorStop(1,'#d8d8d8');
  ctx.fillStyle=tgG;
  ctx.beginPath();ctx.roundRect(tgX,tgTop,tgW,tgBot-tgTop,[4,4,1,1]);ctx.fill();


  // ── SHINE highlight ──
  const shG=ctx.createRadialGradient(sx+sw*0.20,collarHeel+10,0,sx+sw*0.20,collarHeel+10,10);
  shG.addColorStop(0,'rgba(255,255,255,0.45)');shG.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=shG;ctx.beginPath();ctx.ellipse(sx+sw*0.20,collarHeel+10,10,5,-0.3,0,Math.PI*2);ctx.fill();

  // ── GOLD sparkle ──
  if(id==='gold'){
    const gp=0.6+0.4*Math.abs(Math.sin(s.phase));
    ctx.save();ctx.shadowColor='#ffee00';ctx.shadowBlur=18*gp;
    [[-10,-12],[12,-8],[-4,9],[13,4],[2,-18]].forEach(([dx,dy])=>{
      const sp2=Math.abs(Math.sin(s.phase*2.2+dx));
      ctx.fillStyle=`rgba(255,235,60,${sp2*0.95})`;
      ctx.font=`${6+sp2*6}px sans-serif`;ctx.textAlign='center';
      ctx.fillText('★',sx+sw/2+dx,sy+dy);
    });
    ctx.restore();
  }
  ctx.textAlign='left';
}

function drawGameOver(){
  const T=gameOverTimer;
  const ds=getDisplayScore();
  // Animated score count-up: 0→ds over frames 15→90
  const displayScore=T<15?0:T<90?Math.floor(ds*(T-15)/75):ds;
  // Panel/title alpha fades in frames 0→18
  const titleA=Math.min(1,T/18);
  // Info panels fade in after frame 45
  const panelA=Math.min(1,Math.max(0,(T-45)/22));

  // Overlay
  ctx.fillStyle=`rgba(0,0,0,${Math.min(0.85,T/25*0.85)})`;ctx.fillRect(0,0,W,H);

  // GAME OVER title
  ctx.globalAlpha=titleA;
  ctx.shadowColor='#ff69b4';ctx.shadowBlur=22;ctx.fillStyle='#fff';ctx.font='bold 44px monospace';ctx.textAlign='center';
  ctx.fillText('GAME OVER',W/2,70);ctx.shadowBlur=0;

  // Score (count-up)
  ctx.font='20px monospace';ctx.fillStyle='#fff';
  ctx.fillText('\u{1F45F} SNEAKER SCORE: '+displayScore+' pts',W/2,110);
  ctx.font='14px monospace';ctx.fillStyle='#ffe000';
  ctx.fillText('STAGE '+stage+'  DIST '+distanceMeter+'m',W/2,136);
  ctx.globalAlpha=1;

  const lb=getLeaderboard(),isNew=lb.length>0&&lb[0].score===ds;
  if(isNew&&T>90){
    const pulse=0.85+0.15*Math.sin(T*0.18);
    ctx.globalAlpha=Math.min(1,(T-90)/15)*pulse;
    ctx.shadowColor='#FFD700';ctx.shadowBlur=18*pulse;
    ctx.fillStyle='#FFD700';ctx.font='bold 15px monospace';ctx.textAlign='center';
    ctx.fillText('\u{1F3C6} NEW RECORD!',W/2,160);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  ctx.textAlign='left';

  // Leaderboard panels (TOP 10) — fade in from frame 20
  const lbA=Math.min(1,Math.max(0,(T-20)/18));
  if(lbA>0.01){
    const lpw=320,lgap=18,lh=228,ly=172;
    const lx1=230,lx2=568;
    const rc=['#FFD700','#C0C0C0','#CD7F32','rgba(255,255,255,0.72)','rgba(255,255,255,0.58)'];
    const md=['🥇','🥈','🥉','  4','  5'];
    // Draw single connected outer frame

  // Head outline
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.7;
  ctx.beginPath();ctx.moveTo(7,-8);ctx.bezierCurveTo(12,-12,18,-10,22,-6);ctx.bezierCurveTo(25,-4,24,-1,22,0);ctx.bezierCurveTo(18,2,11,2,8,0);ctx.bezierCurveTo(5,-2,5,-6,7,-8);ctx.stroke();
  // Ear (rounded triangle)
  ctx.fillStyle='#4a4040';ctx.beginPath();ctx.moveTo(9,-8);ctx.bezierCurveTo(6,-14,12,-16,13,-9);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(200,100,100,0.35)';ctx.beginPath();ctx.moveTo(9.5,-9);ctx.bezierCurveTo(7.5,-13.5,12,-15,12.5,-9.5);ctx.closePath();ctx.fill();
  // Eye (beady)
  ctx.fillStyle='#0a0808';ctx.beginPath();ctx.arc(17,-6,1.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,100,100,0.8)';ctx.beginPath();ctx.arc(17,-6,1.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.arc(16.5,-6.5,0.6,0,Math.PI*2);ctx.fill();
  // Whiskers
  ctx.strokeStyle='rgba(220,210,200,0.7)';ctx.lineWidth=0.7;ctx.lineCap='round';
  [[22,-4,28,-6],[22,-5,29,-5],[22,-4,28,-3],[22,-5,29,-4]].forEach(([wx1,wy1,wx2,wy2])=>{
    ctx.beginPath();ctx.moveTo(wx1,wy1);ctx.lineTo(wx2,wy2);ctx.stroke();
  });
  // Nostril
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.arc(22,-5,0.7,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawRats(t){rats.forEach(r=>drawRat(r,t));}

function gameLoop(ts){
  dt=prevTs?(Math.min(2.5,(ts-prevTs)/16.667)):1; prevTs=ts;
  globalT+=dt;updateShake();updateFlash();
  // HUD visible only during play and game over
  const _showHud=state!=='idle';
  h1El.style.display=_showHud?'':'none';
  hudEl.style.display=_showHud?'flex':'none';
  messageEl.style.display=_showHud?'':'none';
  ctx.save();ctx.translate(shake.x,shake.y);ctx.clearRect(-20,-20,W+40,H+40);drawBg(globalT);
  if(state==='playing'){
    frame++;const st=getStage(distanceMeter);
    if(!activeEvent||activeEvent.id!=='slow_motion'){speed=st.speedBase;}
    distanceFloat+=speed*0.011*dt;distanceMeter=Math.floor(distanceFloat);
    scoreEl.textContent=getDisplayScore();
    checkStageChange();updateEvent();updateEventItems();
    player.update();updateObstacles();updateSneakers();checkSneakerCollect();updateBirds();updateRoofCats();updateRoofRats();updateBats();
    updateParticles();updateSpeedLines();
    if(checkCollision()){
      state='dead';const ds=getDisplayScore();
      if(ds>hiScore){hiScore=ds;hiScoreEl.textContent=hiScore;}
      saveScore(ds);endEvent();
      messageEl.textContent='';
      sfxDeath();stopBGM();if(bgmStartTimeout)clearTimeout(bgmStartTimeout);bgmStartTimeout=setTimeout(()=>{bgmStartTimeout=null;startBGM('score');},600);triggerShake(10,30);triggerFlash('rgb(255,50,0)',0.7);spawnParticles(player.x,player.y,'death',20);
    }
  }
  drawSpeedLines();drawEventItems(globalT);
  sneakerItems.forEach(s=>drawSneaker(s,globalT));
  obstacles.forEach(o=>drawObstacle(o));drawParticles();player.draw(globalT);drawCoinTexts();
  drawMultiplierBadge();
  if(state==='playing')drawEventBanner();
  drawStageFlash();drawFlash();
  if(state==='dead'){gameOverTimer++;updateBirds();updateRoofCats();updateRoofRats();updateBats();drawGameOver();}
  if(state==='idle'){updateBirds();updateRoofCats();updateRoofRats();updateBats();drawIdle(globalT);}
  ctx.restore();requestAnimationFrame(gameLoop);
}

  obstacles=[];sneakerItems=[];particles=[];speedLines=[];coinTexts=[];eventItems=[];rats=[];ratSpawnTimer=0;

}
function handleInput(){
  if(state==='idle'){
    if(!audioCtx){initAudio();startBGM('title');return;}
    startGame();return;
  }
  if(state==='dead'){startGame();return;}
  if(state==='playing')player.jump();
}

// ── Mobile: canvas auto-resize to fit viewport ──────────────────
const rotateOverlay=document.getElementById('rotateOverlay');
function resizeCanvas(){
  const hudH=(document.getElementById('hud').offsetHeight||36)
           +(document.querySelector('h1').offsetHeight||24)
           +(document.getElementById('message').offsetHeight||18)+20;
  const availW=window.innerWidth-8;
  const availH=window.innerHeight-hudH;
  // Fit by width or height, whichever is smaller
  const byW=availW;
  const byH=availH*(canvas.width/canvas.height);
  const cssW=Math.min(canvas.width,byW,byH);
  canvas.style.width=cssW+'px';
  canvas.style.height=(cssW*(canvas.height/canvas.width))+'px';
}
function checkOrientation(){
  const isMobile=('ontouchstart' in window)||window.innerWidth<1024;
  const isPortrait=window.innerHeight>window.innerWidth;
  const isSmall=window.innerWidth<600||window.innerHeight<400;
  // Show overlay only on small touch screens in portrait
  if(isMobile&&isPortrait&&isSmall){
    rotateOverlay.style.display='flex';
  } else {
    rotateOverlay.style.display='none';
    resizeCanvas();
  }
}
window.addEventListener('resize',checkOrientation);
window.addEventListener('orientationchange',()=>setTimeout(checkOrientation,200));
checkOrientation();
